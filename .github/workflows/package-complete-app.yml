name: Package complete PostCutz app

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Expand production bundles
        run: npm run apply-bundles

      - name: Prepare clean distributable source
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          delete packageJson.scripts['apply-bundles'];
          delete packageJson.scripts['predev'];
          delete packageJson.scripts['prebuild'];
          fs.writeFileSync('package.json', JSON.stringify(packageJson, null, 2) + '\n');
          NODE
          rm -rf .git .github .next node_modules bundles overrides
          rm -f scripts/apply-bundles.mjs
          rmdir scripts 2>/dev/null || true
          find . -name '.env' -o -name '.env.local' -o -name '.env.production' | xargs -r rm -f

      - name: Create ZIP
        run: |
          cd ..
          mv postcutz postcutz-complete
          zip -r postcutz-complete.zip postcutz-complete \
            -x '*/node_modules/*' '*/.next/*' '*/.git/*' '*/.vercel/*' '*/.env' '*/.env.local' '*/.env.*.local'

      - name: Upload complete app ZIP
        uses: actions/upload-artifact@v4
        with:
          name: postcutz-complete-app
          path: ../postcutz-complete.zip
          if-no-files-found: error
          retention-days: 1
