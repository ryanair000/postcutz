name: Package complete PostCutz app

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create clean repository ZIP
        shell: bash
        run: |
          rm -f /tmp/postcutz-complete.zip
          zip -r /tmp/postcutz-complete.zip . \
            -x '.git/*' '.github/*' 'node_modules/*' '.next/*' '.vercel/*' \
               '.env' '.env.local' '.env.production' '.env.*.local' '*.log'

      - name: Upload complete app ZIP
        uses: actions/upload-artifact@v4
        with:
          name: postcutz-complete-app
          path: /tmp/postcutz-complete.zip
          if-no-files-found: error
          retention-days: 1
